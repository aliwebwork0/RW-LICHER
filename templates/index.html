<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Licher — HTTP → MEGA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0a0c0f;
    --surface:   #111418;
    --border:    #1e2530;
    --border2:   #2a3340;
    --text:      #c8d4e0;
    --muted:     #5a6a7a;
    --accent:    #00d4aa;
    --accent2:   #0099ff;
    --danger:    #ff4d6a;
    --warn:      #ffaa00;
    --success:   #00d4aa;
    --mono:      'JetBrains Mono', monospace;
    --sans:      'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px 80px;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 680px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 4px;
    animation: fadeDown 0.5s ease both;
  }

  .logo-icon {
    width: 42px;
    height: 42px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: grid;
    place-items: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .logo-text {
    font-family: var(--sans);
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #fff;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .header-badge {
    margin-left: auto;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 10px;
    border-radius: 20px;
    opacity: 0.7;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }

  .card-header .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  .card-title {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .card-body { padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; }

  /* ── Form Inputs ── */
  .field { display: flex; flex-direction: column; gap: 8px; }

  .field label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-icon {
    position: absolute;
    left: 14px;
    color: var(--muted);
    font-size: 14px;
    pointer-events: none;
    transition: color 0.2s;
  }

  input[type="text"], input[type="url"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 12px 14px 12px 40px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.1);
  }

  input::placeholder { color: var(--muted); }

  /* ── Button ── */
  .btn-start {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 8px;
    color: #000;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 4px;
  }

  .btn-start:hover { opacity: 0.9; }
  .btn-start:active { transform: scale(0.99); }
  .btn-start:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-start .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  .btn-start.loading .spinner { display: block; }
  .btn-start.loading .btn-label { display: none; }

  /* ── Status Card ── */
  #status-card { display: none; }

  .status-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }

  .status-info { display: flex; flex-direction: column; gap: 4px; }

  .status-filename {
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    word-break: break-all;
  }

  .status-url {
    font-size: 11px;
    color: var(--muted);
    word-break: break-all;
  }

  /* Status Badge */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .badge-dot { width: 6px; height: 6px; border-radius: 50%; }

  .badge.queued  { background: rgba(90,106,122,0.15); color: var(--muted); }
  .badge.queued .badge-dot  { background: var(--muted); }

  .badge.running { background: rgba(0,153,255,0.12); color: var(--accent2); }
  .badge.running .badge-dot { background: var(--accent2); animation: pulse 1s infinite; }

  .badge.done    { background: rgba(0,212,170,0.12); color: var(--success); }
  .badge.done .badge-dot    { background: var(--success); }

  .badge.failed  { background: rgba(255,77,106,0.12); color: var(--danger); }
  .badge.failed .badge-dot  { background: var(--danger); }

  /* Progress bar */
  .progress-wrap {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 16px;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    width: 0%;
    transition: width 0.4s ease;
  }

  .progress-bar.indeterminate {
    width: 40%;
    animation: slide 1.4s ease-in-out infinite;
  }

  /* Log Terminal */
  .log-wrap {
    margin-top: 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .log-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    background: rgba(255,255,255,0.02);
    border-bottom: 1px solid var(--border);
  }

  .log-topbar-title {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .log-copy-btn {
    background: none;
    border: 1px solid var(--border2);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1px;
    padding: 3px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    text-transform: uppercase;
  }

  .log-copy-btn:hover { color: var(--accent); border-color: var(--accent); }

  .log-output {
    background: #070a0d;
    color: #7ec8a0;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.7;
    padding: 16px;
    max-height: 260px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  .log-output:empty::before {
    content: 'Waiting for output...';
    color: var(--muted);
    font-style: italic;
  }

  .log-output .line-error { color: var(--danger); }
  .log-output .line-warn  { color: var(--warn); }
  .log-output .line-ok    { color: var(--accent); }

  /* ── Jobs History ── */
  #jobs-card { display: none; }

  .jobs-list { display: flex; flex-direction: column; gap: 1px; }

  .job-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--bg);
    border-radius: 6px;
    transition: background 0.15s;
    cursor: pointer;
  }

  .job-row:hover { background: rgba(255,255,255,0.03); }

  .job-row-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }

  .job-row-name {
    font-size: 13px;
    color: var(--text);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .job-row-status {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .s-queued  { color: var(--muted); }
  .s-running { color: var(--accent2); }
  .s-done    { color: var(--success); }
  .s-failed  { color: var(--danger); }

  /* ── Empty states ── */
  .empty-state {
    text-align: center;
    padding: 32px 16px;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 1px;
  }

  /* ── Animations ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  @keyframes slide {
    0%   { transform: translateX(-150%); }
    50%  { transform: translateX(150%); }
    100% { transform: translateX(400%); }
  }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    body { padding: 24px 12px 60px; }
    .card-body { padding: 18px 16px; }
    .logo-text { font-size: 18px; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <!-- Header -->
  <header>
    <div class="logo-icon">⚡</div>
    <div>
      <div class="logo-text">Licher</div>
      <div class="logo-sub">HTTP → MEGA Transfer</div>
    </div>
    <span class="header-badge">Online</span>
  </header>

  <!-- Input Card -->
  <div class="card" style="animation-delay:0.05s">
    <div class="card-header">
      <div class="dot"></div>
      <span class="card-title">New Transfer</span>
    </div>
    <div class="card-body">
      <div class="field">
        <label>Source URL</label>
        <div class="input-wrap">
          <span class="input-icon">🔗</span>
          <input type="url" id="url" placeholder="https://example.com/file.mp4" autocomplete="off" spellcheck="false">
        </div>
      </div>
      <div class="field">
        <label>Destination Filename</label>
        <div class="input-wrap">
          <span class="input-icon">📄</span>
          <input type="text" id="filename" placeholder="movie.mp4" autocomplete="off" spellcheck="false">
        </div>
      </div>
      <button class="btn-start" id="startBtn" onclick="startTransfer()">
        <div class="spinner"></div>
        <span class="btn-label">▶ Start Transfer</span>
      </button>
    </div>
  </div>

  <!-- Status Card -->
  <div class="card" id="status-card" style="animation-delay:0.1s">
    <div class="card-header">
      <div class="dot" id="status-dot"></div>
      <span class="card-title">Transfer Status</span>
    </div>
    <div class="card-body">
      <div class="status-header">
        <div class="status-info">
          <div class="status-filename" id="status-filename">—</div>
          <div class="status-url" id="status-url">—</div>
        </div>
        <span class="badge queued" id="status-badge">
          <span class="badge-dot"></span>
          <span id="badge-text">Queued</span>
        </span>
      </div>

      <div class="progress-wrap">
        <div class="progress-bar indeterminate" id="progress-bar"></div>
      </div>

      <div class="log-wrap">
        <div class="log-topbar">
          <span class="log-topbar-title">Output Log</span>
          <button class="log-copy-btn" onclick="copyLog()">Copy</button>
        </div>
        <div class="log-output" id="log-output"></div>
      </div>
    </div>
  </div>

  <!-- Jobs History -->
  <div class="card" id="jobs-card" style="animation-delay:0.15s">
    <div class="card-header">
      <div class="dot" style="background: var(--accent2); box-shadow: 0 0 8px var(--accent2)"></div>
      <span class="card-title">All Jobs</span>
      <button class="log-copy-btn" style="margin-left:auto" onclick="loadJobs()">Refresh</button>
    </div>
    <div class="card-body" style="padding: 12px 16px;">
      <div class="jobs-list" id="jobs-list">
        <div class="empty-state">No jobs yet</div>
      </div>
    </div>
  </div>

</div>

<script>
  let currentJobId = null;
  let pollInterval = null;

  const statusColors = {
    queued:  'var(--muted)',
    running: 'var(--accent2)',
    done:    'var(--success)',
    failed:  'var(--danger)',
  };

  async function startTransfer() {
    const url      = document.getElementById('url').value.trim();
    const filename = document.getElementById('filename').value.trim();
    const btn      = document.getElementById('startBtn');

    if (!url || !filename) {
      shake(btn);
      return;
    }

    // UI: loading state
    btn.disabled = true;
    btn.classList.add('loading');

    const form = new FormData();
    form.append('url', url);
    form.append('filename', filename);

    try {
      const res  = await fetch('/start', { method: 'POST', body: form });
      const data = await res.json();

      if (!res.ok) {
        showError(data.error || 'Server error');
        return;
      }

      currentJobId = data.job_id;
      showStatusCard(url, filename);
      startPolling();
      showJobsCard();

    } catch (e) {
      showError('Network error: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  }

  function showStatusCard(url, filename) {
    const card = document.getElementById('status-card');
    card.style.display = 'block';
    document.getElementById('status-filename').textContent = filename;
    document.getElementById('status-url').textContent = url;
    document.getElementById('log-output').textContent = '';
    setStatus('queued');
  }

  function setStatus(status) {
    const badge    = document.getElementById('status-badge');
    const badgeText = document.getElementById('badge-text');
    const dot      = document.getElementById('status-dot');
    const bar      = document.getElementById('progress-bar');

    badge.className = `badge ${status}`;
    badgeText.textContent = status.charAt(0).toUpperCase() + status.slice(1);

    const color = statusColors[status] || 'var(--muted)';
    dot.style.background  = color;
    dot.style.boxShadow   = `0 0 8px ${color}`;

    if (status === 'running') {
      bar.classList.add('indeterminate');
      bar.style.width = '';
    } else if (status === 'done') {
      bar.classList.remove('indeterminate');
      bar.style.width = '100%';
      bar.style.background = 'var(--success)';
    } else if (status === 'failed') {
      bar.classList.remove('indeterminate');
      bar.style.width = '100%';
      bar.style.background = 'var(--danger)';
    } else {
      bar.classList.remove('indeterminate');
      bar.style.width = '0%';
    }
  }

  function renderLog(rawLog) {
    const el = document.getElementById('log-output');
    if (!rawLog) { el.textContent = ''; return; }

    el.innerHTML = rawLog
      .split('\n')
      .map(line => {
        const escaped = line
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');

        if (/error|failed|critical/i.test(line))  return `<span class="line-error">${escaped}</span>`;
        if (/warn|warning/i.test(line))            return `<span class="line-warn">${escaped}</span>`;
        if (/done|success|complete|100%/i.test(line)) return `<span class="line-ok">${escaped}</span>`;
        return escaped;
      })
      .join('\n');

    el.scrollTop = el.scrollHeight;
  }

  function startPolling() {
    if (pollInterval) clearInterval(pollInterval);

    pollInterval = setInterval(async () => {
      try {
        const res  = await fetch('/status/' + currentJobId);
        const data = await res.json();

        setStatus(data.status);
        renderLog(data.log);

        if (data.status === 'done' || data.status === 'failed') {
          clearInterval(pollInterval);
          pollInterval = null;
          loadJobs();
        }
      } catch (e) {
        console.error('Poll error:', e);
      }
    }, 2000);
  }

  async function loadJobs() {
    try {
      const res  = await fetch('/jobs');
      const data = await res.json();
      renderJobsList(data);
    } catch (e) {
      console.error('Jobs fetch error:', e);
    }
  }

  function renderJobsList(jobs) {
    const list = document.getElementById('jobs-list');
    const entries = Object.entries(jobs);

    if (!entries.length) {
      list.innerHTML = '<div class="empty-state">No jobs yet</div>';
      return;
    }

    list.innerHTML = entries.reverse().map(([id, job]) => {
      const color = statusColors[job.status] || 'var(--muted)';
      const name  = (job.filename || id.slice(0, 8)).replace(/</g, '&lt;');
      return `
        <div class="job-row" onclick="viewJob('${id}', '${name}', '${(job.url||'').replace(/'/g,"\\'")}')">
          <div class="job-row-dot" style="background:${color}; box-shadow:0 0 6px ${color}"></div>
          <span class="job-row-name">${name}</span>
          <span class="job-row-status s-${job.status}">${job.status}</span>
        </div>`;
    }).join('');
  }

  function viewJob(id, name, url) {
    currentJobId = id;
    showStatusCard(url, name);
    startPolling();
    document.getElementById('status-card').scrollIntoView({ behavior: 'smooth' });
  }

  function showJobsCard() {
    document.getElementById('jobs-card').style.display = 'block';
    loadJobs();
  }

  function copyLog() {
    const text = document.getElementById('log-output').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.log-copy-btn');
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      btn.style.color = 'var(--accent)';
      setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 1500);
    });
  }

  function showError(msg) {
    const log = document.getElementById('log-output');
    log.innerHTML = `<span class="line-error">✗ ${msg.replace(/</g,'&lt;')}</span>`;
    document.getElementById('status-card').style.display = 'block';
    setStatus('failed');
  }

  function shake(el) {
    el.style.animation = 'none';
    el.offsetHeight; // reflow
    el.style.animation = 'shake 0.3s ease';
    el.addEventListener('animationend', () => el.style.animation = '', { once: true });
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') startTransfer();
  });

  // Load existing jobs on page open
  (async () => {
    try {
      const res  = await fetch('/jobs');
      const data = await res.json();
      if (Object.keys(data).length > 0) {
        showJobsCard();
        renderJobsList(data);
      }
    } catch (_) {}
  })();
</script>
</body>
</html>
